name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Guard native_decide (no new uses)
        run: ./scripts/check_native_decide_guard.sh --scope changed
      - name: PyashGF 6GB clean-build gate
        run: ./scripts/check_pyashgf_6gb.sh
      - name: Pyash English semantic coverage gate
        run: ./scripts/check_pyash_english_semantic_coverage.sh
      - name: GF English linearization coverage gate
        run: ./scripts/check_gf_english_linearization_coverage.sh
      - uses: leanprover/lean-action@v1
      - name: SimpleHE conformance gate
        run: ./scripts/conformance/check_simplehe_conformance.sh
      - name: Chapter 11 quantifier regression
        run: ./scripts/check_ch11_quantifiers.sh
      - name: Chapter 11 fuzzy syllogism regression
        run: ./scripts/check_ch11_fuzzy_syllogism.sh
      - name: Chapter 13 inference-control regression
        run: ./scripts/check_ch13_inference_control.sh
      - name: Install SWI-Prolog (conformance gate)
        run: |
          sudo apt-get update
          sudo apt-get install -y swi-prolog-nox
      - name: Fetch Logtalk ISO conformance corpus
        run: |
          mkdir -p ../_ext/prolog-tests
          git clone --depth 1 https://github.com/LogtalkDotOrg/logtalk3.git ../_ext/prolog-tests/logtalk3
      - name: Prolog conformance + ISO coverage gate
        run: |
          ./scripts/prolog/run_conformance.sh \
            artifacts/prolog/swi_fixture_results_ci.jsonl \
            ../_ext/prolog-tests/logtalk3/tests/prolog
