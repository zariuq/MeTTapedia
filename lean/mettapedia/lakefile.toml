name = "Mettapedia"
version = "0.1.0"
defaultTargets = ["Mettapedia"]
# Lean 4 can fail to create its default thread pool under the project's 6GB ulimit.
# For reproducible builds in this environment, force single-threaded elaboration.
weakLeanArgs = ["-j", "1"]

[[lean_lib]]
name = "Mettapedia"

[[lean_exe]]
name = "mettapedia"
root = "Main"

# Mathlib dependency
# NOTE: batteries comes automatically as a transitive dependency - do NOT add it separately
[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

# Eric Luap's OrderedSemigroups (pinned fork)
[[require]]
name = "ordered_semigroups"
git = "https://github.com/zariuq/OrderedSemigroups.git"
rev = "63e9c6c3457420c16749837102966a5c32f27825"

# Foundation (Lean 4.28.0 release-cached fork)
[[require]]
name = "Foundation"
git = "https://github.com/zariuq/Foundation.git"
rev = "v4.28.0"

# Exchangeability (pinned fork, branch `mettapedia`; includes ForMathlib support library)
[[require]]
name = "exchangeability"
git = "https://github.com/zariuq/exchangeability.git"
rev = "98f6c86e6131df562cc2f715c2e93b70b978c689"

# Provenance semiring library (pinned fork)
[[require]]
name = "provenance"
git = "https://github.com/zariuq/provenance-lean.git"
rev = "79aca19592af945e08f2d204dc1545a13849af3f"

# BorelDeterminacy (local dependency)
[[require]]
name = "borel_det"
path = "Mettapedia/SetTheory/BorelDeterminacy"

# CategoricalLogic (local dependency)
[[require]]
name = "catLogic"
path = "Mettapedia/CategoricalLogic"

# Metatheory (pinned fork)
[[require]]
name = "Metatheory"
git = "https://github.com/zariuq/Metatheory.git"
rev = "5ebc2dcecf05787432a18f96d6202518b3d5a8db"

# Pure algorithm checker kernels (Init-only)
[[require]]
name = "algorithms"
path = "../algorithms"

# Shared batteries-only MeTTaIL executable core
[[require]]
name = "mettail_core"
path = "../batteries/mettail-core"

# GFCore — GF ↔ Lean AST bridge (shared with algorithms)
[[require]]
name = "gf_core"
path = "../batteries/gf-core"

# CertifyingDatalog (Tantow et al., ITP 2025) — pinned fork
[[require]]
name = "certifyingDatalog"
git = "https://github.com/zariuq/CertifyingDatalog.git"
rev = "a269a8fdd097afad2a12081a04263214762faf1b"

# Verified Metamath checker (pinned to the 4.28 integration revision)
[[require]]
name = "mm-lean4"
git = "https://github.com/zariuq/mm-lean4.git"
rev = "396a7a00ba85a6e9df295917031a669b92c7d1e2"
